{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="py-10">
    <header>
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 flex">

        <h1 class="text-3xl font-bold tracking-tight text-gray-900 dark:text-white">Companies</h1>
        <div class="ml-auto mt-4">
          <a href="{% url 'create_company' %}" class="rounded-md bg-green-600 px-3.5 py-2.5 text-sm font-semibold text-white shadow-xs hover:bg-green-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 dark:bg-indigo-500 dark:shadow-none dark:hover:bg-indigo-400 dark:focus-visible:outline-indigo-500">
            New Company
          </a>
      </div>

    </header>
    <main>
      <div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
        <!-- Your content -->
        <ul role="list" class="divide-y divide-gray-100 dark:divide-white/5">
          {% for company in companies %}
          <li class="flex items-center justify-between gap-x-6 py-5">
            <div class="min-w-0">
              <div class="flex items-start gap-x-3">
                <p class="text-sm/6 font-semibold text-gray-900 dark:text-white">{{ company.name}}</p>
              </div>
              <div class="mt-1 flex items-center gap-x-2 text-xs/5 text-gray-500 dark:text-gray-400">
                <p class="whitespace-nowrap">Created <time datetime="2023-03-17T00:00Z">{{ company.created_at }}</time></p>
                <svg viewBox="0 0 2 2" class="size-0.5 fill-current">
                  <circle r="1" cx="1" cy="1" />
                </svg>
                <p class="whitespace-nowrap">Updated <time datetime="2023-03-17T00:00Z">{{ company.updated_at }}</time></p>
              </div>
            </div>
            <div class="flex flex-none items-center gap-x-4">
              <a href="{% url 'company_detail' company.id %}" class="hidden rounded-md bg-white px-2.5 py-1.5 text-sm font-semibold text-gray-900 shadow-xs inset-ring inset-ring-gray-300 hover:bg-gray-50 sm:block dark:bg-white/10 dark:text-white dark:shadow-none dark:inset-ring-white/5 dark:hover:bg-white/20">
                View
              </a>
              <a href="{% url 'update_company' company.id %}" class="hidden rounded-md bg-white px-2.5 py-1.5 text-sm font-semibold text-gray-900 shadow-xs inset-ring inset-ring-gray-300 hover:bg-gray-50 sm:block dark:bg-white/10 dark:text-white dark:shadow-none dark:inset-ring-white/5 dark:hover:bg-white/20">
                Update
              </a>
              <a href="{% url 'company_add_employee' company.id %}" class="hidden rounded-md bg-white px-2.5 py-1.5 text-sm font-semibold text-gray-900 shadow-xs inset-ring inset-ring-gray-300 hover:bg-gray-50 sm:block dark:bg-white/10 dark:text-white dark:shadow-none dark:inset-ring-white/5 dark:hover:bg-white/20">
                Add
              </a>
            </div>
          </li>
          {% endfor %}
        </ul>
      </div>
    </main>
  </div>
</div>

{% endblock %}
